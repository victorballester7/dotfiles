[mgr]
show_hidden = true
linemode = "size_and_mtime"

[opener]
zathura = [
    { run = 'zathura "$@" >/dev/null 2>&1', desc = "Zathura", orphan = true, for = "unix" }
]
document-viewer = [
    { run = 'evince "$@" >/dev/null 2>&1', desc = "Document Viewer", orphan = true, for = "unix" }
]
open = [
    { run = 'xdg-open "$@" >/dev/null 2>&1', desc = "Open", orphan = true, for = "unix" }
]

[open]
prepend_rules = [
    { mime = "application/pdf", use = [ "zathura", "document-viewer" ] },
]

